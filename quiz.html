<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizStack 2026 — AWS Challenge</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>

<!-- Animated grid background -->
<div class="grid-bg"></div>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <!-- Mobile hamburger -->
  <button class="btn-menu" id="btn-menu" aria-label="Open navigator">☰</button>

  <div class="tb-logo">⚡ QUIZSTACK</div>
  <div class="tb-spacer"></div>

  <div class="q-counter">Q <span id="cur-q-num">1</span> / 50</div>

  <div class="timer-wrap">
    <div class="timer-icon">⏱</div>
    <div class="timer-display" id="timer-display">30:00</div>
  </div>
</div>

<!-- ── PROGRESS BAR ── -->
<div class="progress-bar-wrap">
  <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
</div>

<div class="main-layout">

  <!-- ── NAVIGATOR SIDEBAR ── -->
  <div class="nav-sidebar" id="nav-sidebar">
    <div class="nav-title">
      Question Navigator
      <button class="btn-sidebar-close" id="btn-sidebar-close" aria-label="Close navigator">✕</button>
    </div>

    <div class="nav-legend">
      <div class="legend-item"><div class="legend-dot current"></div> Current</div>
      <div class="legend-item"><div class="legend-dot answered"></div> Answered</div>
      <div class="legend-item"><div class="legend-dot unanswered"></div> Skipped</div>
    </div>

    <div class="nav-grid" id="nav-grid"></div>

    <div class="nav-stats">
      <div class="stat-row">
        <span class="stat-label">Answered</span>
        <span class="stat-val green" id="stat-answered">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Skipped</span>
        <span class="stat-val gold" id="stat-skipped">0</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Remaining</span>
        <span class="stat-val muted" id="stat-remaining">50</span>
      </div>
    </div>
  </div>

  <!-- ── QUESTION AREA ── -->
  <div class="question-area">
    <div class="q-card" id="q-card">

      <div class="q-meta">
        <span class="q-number" id="q-num-badge">Q 01</span>
        <span class="q-category" id="q-category">AWS Core</span>
      </div>

      <div class="q-text" id="q-text">Loading question...</div>

      <div class="options-grid" id="options-grid"></div>

      <div class="q-nav">
        <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">← Previous</button>
        <div style="display:flex;gap:8px;align-items:center;">
          <button class="btn-skip" onclick="skipQuestion()">Skip →</button>
          <button class="btn-nav primary" id="btn-next" onclick="navigate(1)">Next →</button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ── SUBMIT BAR ── -->
<div class="submit-bar">
  <div class="submit-info">Answered: <span id="bar-answered">0</span>/50 questions</div>
  <button class="btn-submit" onclick="openSubmitModal()">🚀 SUBMIT QUIZ</button>
</div>

<!-- ── SUBMIT CONFIRMATION MODAL ── -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal-box">
    <div class="modal-icon">🏁</div>
    <div class="modal-title">SUBMIT QUIZ?</div>
    <div class="modal-desc">You're about to submit your answers. This action cannot be undone.</div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-answered">0</div>
        <div class="modal-stat-lbl">Answered</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-skipped">0</div>
        <div class="modal-stat-lbl">Skipped</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-time">--:--</div>
        <div class="modal-stat-lbl">Time Left</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">← Continue</button>
      <button class="btn-confirm" onclick="submitQuiz()">Submit ✓</button>
    </div>
  </div>
</div>

<!-- Question bank + page logic (order matters) -->
<script src="js/questions.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
